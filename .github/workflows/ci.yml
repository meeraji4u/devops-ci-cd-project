name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t devops-ci-cd:${{ github.sha }} .

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name test-app devops-ci-cd:${{ github.sha }}
        sleep 5

    - name: Test health endpoint
      run: curl -f http://localhost:5000/health

    - name: Test main endpoint
      run: curl -f http://localhost:5000/

    - name: Cleanup
      run: docker stop test-app && docker rm test-app

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
